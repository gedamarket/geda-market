<!DOCTYPE html>
<html lang="om">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geda Market</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
header{
    background:#008000;
    color:white;
    padding:15px;
    text-align:center;
}
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}
.card{
    background:white;
    width:220px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
    text-align:center;
    padding:15px;
}
.card img{
    width:100%;
    border-radius:10px;
}
button{
    background:#008000;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:darkgreen;
}
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}
</style>

</head>
<body>

<header>
<h1>🛒 Geda Market</h1>
<p>Baga Nagaan Dhuftan!</p>
</header>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200" alt="">
<h3>Bilbila</h3>
<p>100 USD</p>
<button>Biti</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200" alt="">
<h3>Laptop</h3>
<p>500 USD</p>
<button>Biti</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200" alt="">
<h3>Uffata</h3>
<p>25 USD</p>
<button>Biti</button>
</div>

</div>

<footer>
<p>© 2026 Geda Market</p>
</footer>

</body>
</html>
